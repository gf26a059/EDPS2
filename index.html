<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDPS System Access</title>
    <style>
        :root {
            /* 全体のカード背景（半透明） */
            --bg-gray: rgba(217, 222, 226, 0.5); 
            --text-black: #282829;
            --glass-white: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            min-height: 200vh; /* スクロールできるように長さを確保 */
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; 
        }

        /* 縦に並べるためのラッパー */
        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 80px;      /* 1枚目と2枚目の間の隙間 */
            padding: 10vh 0;
        }

        /* =========================================
           基本のカード（1枚目用）
        ========================================= */
        .container {
            position: relative;
            width: 400px;  
            height: 650px; 
            background-color: var(--bg-gray);
            backdrop-filter: blur(10px); /* 後ろのCDをぼかす */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* =========================================
           ★★ 縦長(9:16)の画像用カード（2枚目用）★★
        ========================================= */
        .portrait-image-card {
            width: 360px;  /* 9の比率 */
            height: 640px; /* 16の比率（縦長） */
            
            /* samegazouを指定（jpgの場合は samegazou.jpg に変えてください） */
            background-image: url('samegazou.png'); 
            background-size: cover;       /* カード全体に画像をぴったり合わせる */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- 1枚目カードの内部パーツ --- */
        .dot-logo { position: absolute; top: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 10px); gap: 6px; }
        .dot { width: 10px; height: 10px; background: black; border-radius: 50%; }

        .info-header { position: absolute; top: 110px; left: 30px; z-index: 5; }
        .id-number { font-size: 32px; font-weight: 900; margin: 0; opacity: 0.8; }
        .name { font-size: 26px; font-weight: 700; border-bottom: 3px solid var(--text-black); padding-bottom: 4px; }

        .bottom-content {
            position: absolute; bottom: 0; width: 100%; height: 280px;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            padding: 30px; box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.5);
        }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 5px; }
        .status-item { border-left: 2px solid var(--text-black); padding-left: 12px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; }
        .value { font-size: 16px; font-weight: bold; margin-top: 2px; }

        .barcode-area { margin-top: 30px; display: flex; flex-direction: column; gap: 8px; }
        .barcode-lines { display: flex; height: 35px; align-items: flex-end; gap: 2px; }
        .line { background: var(--text-black); width: 2px; height: 100%; }
        .line.thick { width: 4px; }
        .line.short { height: 60%; }

        .footer-note { margin-top: 25px; font-size: 9px; color: #777; line-height: 1.4; text-align: justify; }

        /* フェードインアニメーション */
        .fade-in { opacity: 0; transform: translateY(40px); transition: all 0.8s ease-out; }
        .fade-in.is-visible { opacity: 1; transform: translateY(0); }

        /* スマホ用レスポンシブ */
        @media (max-width: 500px) {
            .container { width: 90vw; height: 550px; }
            .portrait-image-card { width: 80vw; height: calc(80vw * 16 / 9); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="card-wrapper">
        
        <div class="container fade-in">
            <div class="dot-logo">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="info-header">
                <p class="id-number">GF26A059</p>
                <span class="name">HARIMA KOUKI</span>
            </div>
            <div class="bottom-content">
                <div class="status-grid">
                    <div class="status-item"><div class="label">Organization</div><div class="value">EDPS</div></div>
                    <div class="status-item"><div class="label">SAME Access Level</div><div class="value">SSS-CLASS</div></div>
                </div>
                <div class="barcode-area">
                    <div class="barcode-lines">
                        <div class="line thick"></div><div class="line"></div><div class="line short"></div><div class="line"></div><div class="line thick"></div>
                    </div>
                </div>
                <div class="footer-note">このデータシートは、HARIMAKOUKI及びGeminiによって生成されました。HARIMAKOUKIは、イラストレーション、3Dモデルなどを担当しています。SAMEは、捕食を担当しています。本資料を、著作者以外の第三者が承諾なく複製することは、SAMEにより制限されます。</div>
            </div>
        </div>

        <div class="container portrait-image-card fade-in">
            
            </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        // フェードイン
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Three.js
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-5*aspect, 5*aspect, 5, -5, 0.1, 1000);
        camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#bg-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        let myModel;
        new THREE.GLTFLoader().load('sameCD2.glb', (gltf) => {
            myModel = gltf.scene;
            myModel.rotation.x = Math.PI / 6;
            // カードが縦長になったので、CDの表示位置を中心に寄せて少し大きくしています
            myModel.position.set(2.0 * aspect, 0, -3); 
            myModel.scale.set(4.5, 4.5, 4.5); 
            scene.add(myModel);
        });

        function animate() {
            requestAnimationFrame(animate);
            const t = document.body.getBoundingClientRect().top;
            if (myModel) {
                myModel.rotation.y = t * -0.002 + Date.now() * 0.0001; 
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -5 * aspect; camera.right = 5 * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
