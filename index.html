<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDPS System Access</title>
    <style>
        /* -----------------------------------
           1. 全体と背景キャンバスのスタイル
        ----------------------------------- */
        :root {
            --bg-gray: #d9dee2;
            --text-black: #282829;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            /* スクロールできるようにページを縦長にする（2画面分） */
            height: 200vh; 
        }

        /* 3Dを描画するキャンバス（常に背景に固定） */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; /* コンテンツの裏側に置く */
        }

        /* -----------------------------------
           2. EDPS IDカードのスタイル
        ----------------------------------- */
        /* カードを画面の中央（少し上）に配置するラッパー */
        .card-wrapper {
            display: flex;
            justify-content: center;
            padding-top: 10vh; /* 上から少し余白を取る */
        }

        .container {
            position: relative;
            width: 450px;
            height: 750px;
            background-color: var(--bg-gray);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            border-radius: 8px;
            margin-left: -20px;
        }

        .dot-logo {
            position: absolute; top: 40px; left: 40px;
            display: grid; grid-template-columns: repeat(3, 12px); gap: 8px;
        }
        .dot { width: 12px; height: 12px; background: black; border-radius: 50%; }

        .info-header {
            position: absolute; top: 140px; left: 40px; z-index: 5;
        }
        .id-number { font-size: 40px; font-weight: 900; margin: 0; }
        .name { 
            font-size: 32px; font-weight: 700; 
            border-bottom: 4px solid var(--text-black);
            padding-bottom: 4px;
        }

        .bottom-content {
            position: absolute;
            bottom: 0; width: 100%; height: 320px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.5);
        }

        .status-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;
        }
        .status-item { border-left: 3px solid var(--text-black); padding-left: 15px; }
        .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 18px; font-weight: bold; margin-top: 4px; }

        .barcode-area { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; }
        .barcode-lines { display: flex; height: 40px; align-items: flex-end; gap: 2px; }
        .line { background: var(--text-black); width: 2px; height: 100%; }
        .line.thick { width: 5px; }
        .line.short { height: 60%; }

        .footer-note { margin-top: 30px; font-size: 10px; color: #888; line-height: 1.5; text-align: justify; }

        /* -----------------------------------
           3. フェードイン用のアニメーション設定
        ----------------------------------- */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-in.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .status-grid { transition-delay: 0.1s; }
        .barcode-area { transition-delay: 0.3s; }
        .footer-note { transition-delay: 0.5s; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="card-wrapper">
        <div class="container fade-in">
            <div class="dot-logo">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div class="info-header">
                <p class="id-number">GF26A059</p>
                <span class="name">HARIMA KOUKI</span>
            </div>

            <div class="bottom-content">
                <div class="status-grid fade-in">
                    <div class="status-item">
                        <div class="label">Organization</div>
                        <div class="value">EDPS DIVISION</div>
                    </div>
                    <div class="status-item">
                        <div class="label">Access Level</div>
                        <div class="value">A-CLASS</div>
                    </div>
                </div>

                <div class="barcode-area fade-in">
                    <div class="label">System Authentication ID</div>
                    <div class="barcode-lines">
                        <div class="line thick"></div><div class="line"></div><div class="line short"></div>
                        <div class="line thick short"></div><div class="line"></div><div class="line thick"></div>
                        <div class="line"></div><div class="line short"></div><div class="line thick"></div>
                        <div class="line"></div><div class="line thick"></div><div class="line short"></div>
                        <div class="line thick"></div><div class="line"></div><div class="line thick"></div>
                    </div>
                </div>

                <div class="footer-note fade-in">
                    このデータシートは、HARIMAKOUKI及びGeminiによって生成されました。
                    複製および外部への持ち出しは厳禁とされていません。
                </div>
            </div>
        </div>
    </div>

    <div style="position: absolute; top: 120vh; width: 100%; text-align: center; color: #888; font-weight: bold;">
        ↓ Scroll Down to Rotate System Disk ↓
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // -----------------------------------
        // 1. フェードインのアニメーション制御
        // -----------------------------------
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // -----------------------------------
        // 2. Three.js (背景のCD回転)
        // -----------------------------------
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5; 
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        camera.position.z = 10; 
        
        const renderer = new THREE.WebGLRenderer({
            canvas: document.querySelector('#bg-canvas'),
            alpha: true,
            antialias: true
        });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 10, 10);
        scene.add(directionalLight);

        let myModel; 
        let modelGroup; 
        const gltfLoader = new THREE.GLTFLoader();

        // ★ 'EDPS_CD.glb' など、自分のファイル名に合わせてください
        gltfLoader.load('sameCD2.glb', (gltf) => {
            myModel = gltf.scene;
            modelGroup = new THREE.Group();
            modelGroup.add(myModel);

            modelGroup.rotation.x = Math.PI / 6;

            // ★ ここでCDの位置を調整します（例：右上の奥の方）
            myModel.position.set(2 * aspect, 1, -2); 
            myModel.scale.set(4, 4, 4); 

            scene.add(modelGroup);
        });

        // スクロールでCDを回す
        function moveCamera() {
            const t = document.body.getBoundingClientRect().top;
            if (myModel) {
                myModel.rotation.y = t * -0.005; 
            }
        }
        document.body.onscroll = moveCamera;
        moveCamera();

        function animate() {
            requestAnimationFrame(animate);
            // 少しだけ常に自動回転させる
            if (myModel) {
                myModel.rotation.y += 0.002; 
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
